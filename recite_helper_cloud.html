<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背诵助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        .main-content {
            flex: 1;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-bar {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .user-bar .username {
            color: #00d4ff;
            font-weight: 600;
        }

        .user-bar .switch-btn {
            margin-left: 15px;
            padding: 4px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #aaa;
            cursor: pointer;
        }

        .user-bar .switch-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .input-section, .versions-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-section h2 {
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            color: #aaa;
            font-size: 14px;
        }

        select, input[type="number"], input[type="text"] {
            padding: 10px 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        select:focus, input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 6px 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-icon:hover {
            background: rgba(255, 77, 77, 0.5);
        }

        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-category-btn {
            padding: 4px 12px;
            font-size: 12px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .category-list {
            margin-bottom: 20px;
        }

        .category-item {
            margin-bottom: 8px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .category-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .category-arrow {
            margin-right: 10px;
            transition: transform 0.3s;
            color: #666;
        }

        .category-item.expanded .category-arrow {
            transform: rotate(90deg);
        }

        .category-name {
            flex: 1;
            font-weight: 600;
            color: #fff;
        }

        .category-count {
            font-size: 12px;
            color: #666;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 8px;
        }

        .category-delete {
            opacity: 0;
            transition: opacity 0.3s;
            padding: 4px 8px;
            font-size: 11px;
            background: rgba(255, 77, 77, 0.3);
        }

        .category-header:hover .category-delete {
            opacity: 1;
        }

        .tags-list {
            display: none;
            padding: 0 15px 10px 35px;
        }

        .category-item.expanded .tags-list {
            display: block;
        }

        .tag-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .tag-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-left-color: #00d4ff;
            transform: translateX(3px);
        }

        .tag-item.active {
            background: rgba(0, 212, 255, 0.15);
            border-left-color: #00d4ff;
        }

        .tag-name-text {
            flex: 1;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tag-delete {
            opacity: 0;
            transition: opacity 0.3s;
            margin-left: 8px;
        }

        .tag-item:hover .tag-delete {
            opacity: 1;
        }

        .empty-tags {
            color: #666;
            font-size: 13px;
            padding: 10px;
            text-align: center;
        }

        .save-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .save-section h4 {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }

        .form-group input, .form-group select {
            width: 100%;
        }

        .current-tag-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .current-tag-info.show {
            display: block;
        }

        .current-tag-info .info-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .current-tag-info .info-value {
            color: #00d4ff;
            font-weight: 600;
            font-size: 16px;
        }

        .versions-section {
            display: none;
        }

        .versions-section.active {
            display: block;
        }

        .version-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .version-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .version-tab.active {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            border-color: transparent;
            color: white;
        }

        .version-tab:hover:not(.active) {
            border-color: #00d4ff;
            color: #fff;
        }

        .content-display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 30px;
            line-height: 2;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 200px;
        }

        .text-content {
            color: #ffffff;
            transition: all 0.3s;
        }

        .blank {
            display: inline-block;
            min-width: 60px;
            padding: 4px 12px;
            margin: 0 4px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            user-select: none;
        }

        .blank:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .blank.revealed {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
            font-weight: 600;
        }

        .hint {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .visitor-count {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .visitor-count span {
            color: rgba(0, 212, 255, 0.6);
            font-weight: 600;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 10px;
        }

        .login-container .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .login-form {
            margin-bottom: 25px;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            text-align: center;
        }

        .login-form input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .login-form button {
            width: 100%;
            padding: 15px;
        }

        .existing-users {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .existing-users h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .user-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .user-chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .user-chip:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .main-app {
            display: none;
        }

        .main-app.show {
            display: block;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }

        .modal h3 {
            color: #00d4ff;
            margin-bottom: 15px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .sync-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
        }

        .sync-status.show {
            display: block;
        }

        .sync-status.syncing {
            color: #ffd700;
        }

        .sync-status.synced {
            color: #00ff88;
        }

        .sync-status.error {
            color: #ff4444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-display {
            animation: fadeIn 0.5s ease;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
                max-height: none;
            }
            .login-container {
                margin: 50px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 同步状态提示 -->
    <div id="syncStatus" class="sync-status"></div>

    <!-- 登录界面 -->
    <div id="loginPage" class="login-container">
        <h1>📝 背诵助手</h1>
        <p class="subtitle">多人独立使用，数据云端同步</p>
        
        <div class="login-form">
            <input type="text" id="usernameInput" placeholder="输入用户名（新用户自动创建）" maxlength="20">
            <button onclick="login()">进入</button>
        </div>

        <div class="existing-users" id="existingUsersSection" style="display: none;">
            <h3>已有用户（点击切换）</h3>
            <div class="user-list" id="userList"></div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="mainApp" class="main-app">
        <div class="container">
            <div class="main-content">
                <div class="user-bar">
                    当前用户：<span class="username" id="currentUsername"></span>
                    <button class="switch-btn" onclick="logout()">切换用户</button>
                </div>

                <h1>📝 背诵助手</h1>
                
                <div id="currentTagInfo" class="current-tag-info">
                    <div class="info-label">当前标签</div>
                    <div class="info-value" id="currentTagDisplay">未选择</div>
                </div>

                <div class="input-section">
                    <h2>📄 输入要背诵的文本</h2>
                    <textarea id="inputText" placeholder="在这里粘贴或输入你要背诵的文章..."></textarea>
                    
                    <div class="controls">
                        <div class="control-group">
                            <label>挖空模式：</label>
                            <select id="blankMode">
                                <option value="random">随机挖空</option>
                                <option value="sentence">每句挖空</option>
                                <option value="keyword">关键词挖空</option>
                                <option value="noun">名词挖空</option>
                            </select>
                        </div>
                        
                        <div class="control-group">
                            <label>挖空比例：</label>
                            <select id="blankRatio">
                                <option value="0.2">20%</option>
                                <option value="0.3" selected>30%</option>
                                <option value="0.4">40%</option>
                                <option value="0.5">50%</option>
                            </select>
                        </div>
                        
                        <div class="control-group">
                            <label>版本数量：</label>
                            <input type="number" id="versionCount" value="3" min="2" max="5" style="width: 60px;">
                        </div>
                        
                        <button onclick="generateBlanks()">生成填空</button>
                    </div>
                </div>

                <div id="versionsSection" class="versions-section">
                    <div class="input-section">
                        <h2>✏️ 选择填空版本</h2>
                        
                        <div class="version-tabs" id="versionTabs"></div>
                        
                        <div class="content-display" id="contentDisplay"></div>
                        
                        <div class="hint">💡 点击括号（ ）显示答案，再次点击隐藏</div>
                        
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value" id="blankCount">0</div>
                                <div class="stat-label">填空数量</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="revealedCount">0</div>
                                <div class="stat-label">已显示</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="progress">0%</div>
                                <div class="stat-label">完成度</div>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn-secondary" onclick="showAll()">显示全部</button>
                            <button class="btn-secondary" onclick="hideAll()">隐藏全部</button>
                            <button class="btn-secondary" onclick="resetProgress()">重置进度</button>
                            <button class="btn-secondary" onclick="regenerateBlanks()">🔄 重新填空</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <h3>
                    📚 记忆库
                    <button class="add-category-btn btn-small" onclick="showAddCategoryModal()">+ 新建分类</button>
                </h3>
                
                <div class="category-list" id="categoryList">
                    <div class="empty-tags">暂无分类，点击上方按钮创建</div>
                </div>

                <div class="save-section">
                    <h4>💾 保存当前文本</h4>
                    <div class="form-group">
                        <label>标签名称</label>
                        <input type="text" id="tagName" placeholder="例如：静夜思">
                    </div>
                    <div class="form-group">
                        <label>选择分类</label>
                        <select id="saveCategory">
                            <option value="">-- 请选择分类 --</option>
                        </select>
                    </div>
                    <button class="btn-small" onclick="saveToLibrary()" style="width: 100%;">保存到库</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 全局访问统计 -->
    <div class="visitor-count">
        总访问：<span id="visitCount">0</span>
    </div>

    <!-- 添加分类模态框 -->
    <div id="categoryModal" class="modal-overlay">
        <div class="modal">
            <h3>新建分类</h3>
            <input type="text" id="newCategoryName" placeholder="输入分类名称">
            <div class="modal-buttons">
                <button class="btn-secondary btn-small" onclick="hideModal()">取消</button>
                <button class="btn-small" onclick="addCategory()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 使用免费的 CountAPI 进行跨设备访问统计
        const COUNTER_API = 'https://api.countapi.xyz';
        const COUNTER_NAMESPACE = 'recite-helper';
        const COUNTER_KEY = 'total-visits';
        
        // 用户列表使用 JSONBin 存储（另一个免费服务）
        const JSONBIN_API = 'https://api.jsonbin.io/v3/b';
        const JSONBIN_BIN_ID = 'your-bin-id'; // 需要用户自己创建
        
        // 本地存储作为降级方案
        const LOCAL_VISIT_KEY = 'reciteHelperVisits_global_backup';
        const USERS_LIST_KEY = 'reciteHelperUsers_list';
        const USER_DATA_PREFIX = 'reciteHelperLibrary_user_';
        
        let currentUser = null;
        let library = { categories: [] };
        let versions = [];
        let currentVersion = 0;
        let totalBlanks = 0;
        let revealedBlanks = new Set();
        let currentTagId = null;
        let currentCategoryName = null;

        // 显示同步状态
        function showSyncStatus(message, type = 'syncing') {
            const status = document.getElementById('syncStatus');
            status.textContent = message;
            status.className = 'sync-status show ' + type;
            
            if (type !== 'syncing') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 3000);
            }
        }

        // 更新访问计数（云端 + 本地备份）
        async function updateVisitCount() {
            showSyncStatus('正在同步访问数据...', 'syncing');
            
            let count = 0;
            
            // 尝试从云端获取并更新
            try {
                const response = await fetch(`${COUNTER_API}/hit/${COUNTER_NAMESPACE}/${COUNTER_KEY}`);
                if (response.ok) {
                    const data = await response.json();
                    count = data.value;
                }
            } catch (e) {
                console.log('云端计数失败，使用本地备份');
                // 云端失败，使用本地备份
                let localCount = parseInt(localStorage.getItem(LOCAL_VISIT_KEY) || '0');
                localCount++;
                localStorage.setItem(LOCAL_VISIT_KEY, localCount.toString());
                count = localCount;
            }
            
            document.getElementById('visitCount').textContent = count;
            showSyncStatus('同步完成', 'synced');
            return count;
        }

        // 初始化
        async function init() {
            await updateVisitCount();
            showExistingUsers();
            
            const savedUser = sessionStorage.getItem('reciteHelper_currentUser');
            if (savedUser) {
                currentUser = savedUser;
                loadUserData();
                showMainApp();
            }
        }

        // 显示已有用户
        function showExistingUsers() {
            const users = getUsersList();
            if (users.length > 0) {
                document.getElementById('existingUsersSection').style.display = 'block';
                const list = document.getElementById('userList');
                list.innerHTML = users.map(u => 
                    `<span class="user-chip" onclick="quickLogin('${escapeHtml(u)}')">${escapeHtml(u)}</span>`
                ).join('');
            }
        }

        function getUsersList() {
            const data = localStorage.getItem(USERS_LIST_KEY);
            return data ? JSON.parse(data) : [];
        }

        function addUserToList(username) {
            const users = getUsersList();
            if (!users.includes(username)) {
                users.push(username);
                localStorage.setItem(USERS_LIST_KEY, JSON.stringify(users));
            }
        }

        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            currentUser = username;
            addUserToList(username);
            sessionStorage.setItem('reciteHelper_currentUser', username);
            
            loadUserData();
            showMainApp();
        }

        function quickLogin(username) {
            currentUser = username;
            sessionStorage.setItem('reciteHelper_currentUser', username);
            
            loadUserData();
            showMainApp();
        }

        function logout() {
            currentUser = null;
            currentTagId = null;
            currentCategoryName = null;
            versions = [];
            revealedBlanks.clear();
            
            sessionStorage.removeItem('reciteHelper_currentUser');
            
            document.getElementById('mainApp').classList.remove('show');
            document.getElementById('loginPage').style.display = 'block';
            
            showExistingUsers();
        }

        function showMainApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').classList.add('show');
            document.getElementById('currentUsername').textContent = currentUser;
            
            renderCategories();
            updateSaveCategoryOptions();
        }

        function loadUserData() {
            const data = localStorage.getItem(USER_DATA_PREFIX + currentUser);
            if (data) {
                library = JSON.parse(data);
            } else {
                library = { categories: [] };
            }
        }

        function saveUserData() {
            localStorage.setItem(USER_DATA_PREFIX + currentUser, JSON.stringify(library));
        }

        function showAddCategoryModal() {
            document.getElementById('categoryModal').classList.add('show');
            document.getElementById('newCategoryName').value = '';
            document.getElementById('newCategoryName').focus();
        }

        function hideModal() {
            document.getElementById('categoryModal').classList.remove('show');
        }

        function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) {
                alert('请输入分类名称');
                return;
            }
            
            if (library.categories.find(c => c.name === name)) {
                alert('该分类已存在');
                return;
            }
            
            library.categories.push({
                name: name,
                items: []
            });
            
            saveUserData();
            renderCategories();
            updateSaveCategoryOptions();
            hideModal();
        }

        function deleteCategory(name, event) {
            event.stopPropagation();
            if (confirm(`确定要删除分类「${name}」及其所有标签吗？`)) {
                library.categories = library.categories.filter(c => c.name !== name);
                saveUserData();
                renderCategories();
                updateSaveCategoryOptions();
                
                if (currentCategoryName === name) {
                    clearCurrentTag();
                }
            }
        }

        function toggleCategory(element) {
            const item = element.closest('.category-item');
            item.classList.toggle('expanded');
        }

        function renderCategories() {
            const list = document.getElementById('categoryList');
            
            if (library.categories.length === 0) {
                list.innerHTML = '<div class="empty-tags">暂无分类，点击上方按钮创建</div>';
                return;
            }
            
            list.innerHTML = library.categories.map(category => `
                <div class="category-item" data-category="${escapeHtml(category.name)}">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span class="category-arrow">▶</span>
                        <span class="category-name">${escapeHtml(category.name)}</span>
                        <span class="category-count">${category.items.length}</span>
                        <button class="category-delete btn-icon" onclick="deleteCategory('${escapeHtml(category.name)}', event)">删除</button>
                    </div>
                    <div class="tags-list">
                        ${category.items.length === 0 
                            ? '<div class="empty-tags">该分类下暂无标签</div>'
                            : category.items.map(item => `
                                <div class="tag-item ${currentTagId === item.id ? 'active' : ''}" 
                                     onclick="loadTag('${escapeHtml(category.name)}', '${item.id}')">
                                    <span class="tag-name-text">${escapeHtml(item.name)}</span>
                                    <button class="tag-delete btn-icon" onclick="deleteTag('${escapeHtml(category.name)}', '${item.id}', event)">×</button>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `).join('');
        }

        function loadTag(categoryName, tagId) {
            const category = library.categories.find(c => c.name === categoryName);
            if (!category) return;
            
            const item = category.items.find(i => i.id === tagId);
            if (!item) return;
            
            currentTagId = tagId;
            currentCategoryName = categoryName;
            
            document.getElementById('inputText').value = item.text;
            document.getElementById('tagName').value = item.name;
            document.getElementById('saveCategory').value = categoryName;
            
            document.getElementById('currentTagInfo').classList.add('show');
            document.getElementById('currentTagDisplay').textContent = `${categoryName} / ${item.name}`;
            
            versions = [];
            revealedBlanks.clear();
            document.getElementById('versionsSection').classList.remove('active');
            
            renderCategories();
            
            document.querySelectorAll('.category-item').forEach(el => {
                if (el.dataset.category === categoryName) {
                    el.classList.add('expanded');
                }
            });
        }

        function deleteTag(categoryName, tagId, event) {
            event.stopPropagation();
            const category = library.categories.find(c => c.name === categoryName);
            if (!category) return;
            
            if (confirm('确定要删除这个标签吗？')) {
                category.items = category.items.filter(i => i.id !== tagId);
                saveUserData();
                renderCategories();
                
                if (currentTagId === tagId) {
                    clearCurrentTag();
                }
            }
        }

        function clearCurrentTag() {
            currentTagId = null;
            currentCategoryName = null;
            document.getElementById('currentTagInfo').classList.remove('show');
            document.getElementById('currentTagDisplay').textContent = '未选择';
        }

        function saveToLibrary() {
            const text = document.getElementById('inputText').value.trim();
            const name = document.getElementById('tagName').value.trim();
            const categoryName = document.getElementById('saveCategory').value;

            if (!text) {
                alert('请先输入要保存的文本！');
                return;
            }
            if (!name) {
                alert('请给这段文字起个标签名称！');
                return;
            }
            if (!categoryName) {
                alert('请选择或创建一个分类！');
                return;
            }

            const category = library.categories.find(c => c.name === categoryName);
            if (!category) {
                alert('分类不存在，请先创建分类');
                return;
            }

            if (currentTagId && currentCategoryName === categoryName) {
                const item = category.items.find(i => i.id === currentTagId);
                if (item) {
                    item.name = name;
                    item.text = text;
                    item.updatedAt = new Date().toLocaleString('zh-CN');
                }
            } else {
                const newItem = {
                    id: Date.now().toString(),
                    name: name,
                    text: text,
                    createdAt: new Date().toLocaleString('zh-CN')
                };
                category.items.push(newItem);
                currentTagId = newItem.id;
                currentCategoryName = categoryName;
            }

            saveUserData();
            renderCategories();
            updateSaveCategoryOptions();

            document.getElementById('currentTagInfo').classList.add('show');
            document.getElementById('currentTagDisplay').textContent = `${categoryName} / ${name}`;

            setTimeout(() => {
                document.querySelectorAll('.category-item').forEach(el => {
                    if (el.dataset.category === categoryName) {
                        el.classList.add('expanded');
                    }
                });
            }, 50);

            alert('保存成功！');
        }

        function updateSaveCategoryOptions() {
            const select = document.getElementById('saveCategory');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="">-- 请选择分类 --</option>' +
                library.categories.map(c => 
                    `<option value="${escapeHtml(c.name)}" ${currentValue === c.name ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
                ).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 填空功能
        function tokenize(text) {
            return text.match(/[\u4e00-\u9fa5]+|[a-zA-Z]+|\d+|[，。！？、；：""''（）《》【】]/g) || [text];
        }

        function isNoun(word) {
            const nounPatterns = ['人', '物', '事', '时', '地', '道', '理', '心', '身', '家', '国', '天', '地', '山', '水', '风', '雨'];
            return nounPatterns.some(p => word.includes(p)) && word.length >= 2;
        }

        function getRandomIndices(total, count) {
            const indices = [];
            const pool = Array.from({length: total}, (_, i) => i);
            for (let i = 0; i < count && pool.length > 0; i++) {
                const randIndex = Math.floor(Math.random() * pool.length);
                indices.push(pool.splice(randIndex, 1)[0]);
            }
            return indices.sort((a, b) => a - b);
        }

        function generateVersion(text, mode, ratio, seed) {
            const tokens = tokenize(text);
            const result = [];
            let blankIndices = new Set();
            
            if (mode === 'random') {
                const blankCount = Math.max(1, Math.floor(tokens.length * ratio));
                const indices = getRandomIndices(tokens.length, blankCount);
                blankIndices = new Set(indices);
            } else if (mode === 'sentence') {
                for (let i = 0; i < tokens.length; i++) {
                    if (/[。！？.!?；;]/.test(tokens[i]) && i > 0) {
                        if (Math.random() < ratio) {
                            blankIndices.add(i - 1);
                        }
                    }
                }
            } else if (mode === 'keyword') {
                for (let i = 0; i < tokens.length; i++) {
                    if (tokens[i].length >= 2 && !/[，。！？、；：""''（）《》【】]/.test(tokens[i])) {
                        if (Math.random() < ratio) {
                            blankIndices.add(i);
                        }
                    }
                }
            } else if (mode === 'noun') {
                for (let i = 0; i < tokens.length; i++) {
                    if (isNoun(tokens[i]) && Math.random() < ratio * 1.5) {
                        blankIndices.add(i);
                    }
                }
            }

            for (let i = 0; i < tokens.length; i++) {
                if (blankIndices.has(i) && !/[，。！？、；：""''（）《》【】\s]/.test(tokens[i])) {
                    result.push({
                        type: 'blank',
                        content: tokens[i],
                        id: `blank_${seed}_${i}`
                    });
                } else {
                    result.push({
                        type: 'text',
                        content: tokens[i]
                    });
                }
            }
            
            return result;
        }

        function generateBlanks() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                alert('请先输入要背诵的文本！');
                return;
            }
            doGenerateBlanks();
        }

        function doGenerateBlanks() {
            const text = document.getElementById('inputText').value.trim();
            const mode = document.getElementById('blankMode').value;
            const ratio = parseFloat(document.getElementById('blankRatio').value);
            const count = parseInt(document.getElementById('versionCount').value);

            versions = [];
            for (let i = 0; i < count; i++) {
                versions.push(generateVersion(text, mode, ratio, i));
            }

            totalBlanks = 0;
            versions[0].forEach(item => {
                if (item.type === 'blank') totalBlanks++;
            });

            revealedBlanks.clear();
            currentVersion = 0;

            renderTabs();
            renderContent(0);
            updateStats();

            document.getElementById('versionsSection').classList.add('active');
        }

        function regenerateBlanks() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                alert('当前没有文本内容！');
                return;
            }
            revealedBlanks.clear();
            doGenerateBlanks();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('versionTabs');
            tabsContainer.innerHTML = '';
            
            versions.forEach((_, index) => {
                const tab = document.createElement('div');
                tab.className = 'version-tab' + (index === 0 ? ' active' : '');
                tab.textContent = `版本 ${index + 1}`;
                tab.onclick = () => switchVersion(index);
                tabsContainer.appendChild(tab);
            });
        }

        function switchVersion(index) {
            currentVersion = index;
            
            document.querySelectorAll('.version-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
            
            renderContent(index);
        }

        function renderContent(versionIndex) {
            const display = document.getElementById('contentDisplay');
            const version = versions[versionIndex];
            
            let html = '<div class="text-content">';
            version.forEach(item => {
                if (item.type === 'blank') {
                    const isRevealed = revealedBlanks.has(item.id);
                    html += `<span class="blank ${isRevealed ? 'revealed' : ''}" 
                                  onclick="toggleBlank('${item.id}', this)"
                                  data-answer="${item.content}">
                                  ${isRevealed ? item.content : '（　　）'}
                             </span>`;
                } else {
                    html += item.content;
                }
            });
            html += '</div>';
            
            display.innerHTML = html;
        }

        function toggleBlank(id, element) {
            if (revealedBlanks.has(id)) {
                revealedBlanks.delete(id);
                element.textContent = '（　　）';
                element.classList.remove('revealed');
            } else {
                revealedBlanks.add(id);
                element.textContent = element.dataset.answer;
                element.classList.add('revealed');
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('blankCount').textContent = totalBlanks;
            document.getElementById('revealedCount').textContent = revealedBlanks.size;
            const progress = totalBlanks > 0 ? Math.round((revealedBlanks.size / totalBlanks) * 100) : 0;
            document.getElementById('progress').textContent = progress + '%';
        }

        function showAll() {
            const blanks = document.querySelectorAll('.blank');
            blanks.forEach(blank => {
                const id = blank.getAttribute('onclick').match(/'([^']+)'/)[1];
                revealedBlanks.add(id);
                blank.textContent = blank.dataset.answer;
                blank.classList.add('revealed');
            });
            updateStats();
        }

        function hideAll() {
            revealedBlanks.clear();
            const blanks = document.querySelectorAll('.blank');
            blanks.forEach(blank => {
                blank.textContent = '（　　）';
                blank.classList.remove('revealed');
            });
            updateStats();
        }

        function resetProgress() {
            hideAll();
        }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    generateBlanks();
                } else if (e.key === 's') {
                    e.preventDefault();
                    saveToLibrary();
                } else if (e.key === 'a') {
                    e.preventDefault();
                    showAll();
                } else if (e.key === 'h') {
                    e.preventDefault();
                    hideAll();
                }
            }
        });

        document.getElementById('categoryModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideModal();
            }
        });

        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });

        init();
    </script>
</body>
</html>
